<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#board{
    width:90%;
    height:90%;
    overflow:hidden;
    border:4px solid;
    position:relative;
}

#screen{
    width:2000px;
    height:2000px;
    position:absolute;
    background-image: url(IMG_20251001_093540_599.jpg);
    background-repeat: repeat;
}

#player{
    width:50px;
    height:50px;
    background:green;
    position:absolute;
    color:white;
    text-align:center;
    line-height:50px;
}

.item{
    width:40px;
    height:40px;
    position:absolute;
    border-radius:50%;
    border: solid green 4px;
}

#item{ background-color: aqua; }
#item2{ background-color: lime; }
#item3{ background-color: orange; }
#item4{ background-color: purple; }

#blueDoor{ background:aqua; border:solid blue 4px; }
#greenDoor{ background:lime; border:solid green 4px; }
#orangeDoor{ background:orange; border:solid brown 4px; }
#PurpleDoor{ background:purple; border:solid black 4px; }
.door{
    width:100px;
    height:100px;
    position:absolute;
}

</style>
</head>
<body>
    
<div id="board">
    <div id="screen">
        <div id="player">Me</div>
        <div id="item" class="item">Key1</div>
        <div id="item2" class="item">Key2</div>
        <div id="item3" class="item">Key3</div>
        <div id="item4" class="item">Key4</div>

        <div id="blueDoor" class="door">Closed</div>
        <div id="greenDoor" class="door">Closed</div>
        <div id="orangeDoor" class="door">Closed</div>
        <div id="PurpleDoor" class="door">Closed</div>
    </div>
</div>

<script>
let player = document.getElementById("player")
let screen = document.getElementById("screen")
let x = 100
let y = 100
let keys = {}
let inventory = {}

let doors =[
    { dor: document.getElementById("blueDoor"), x:1000, y:1000, type:"blue", unlocked:false},
    { dor: document.getElementById("greenDoor"), x:500, y:500, type:"green", unlocked:false},
    { dor: document.getElementById("orangeDoor"), x:800, y:800, type:"orange", unlocked:false},
    { dor: document.getElementById("PurpleDoor"), x:700, y:700, type:"purple", unlocked:false},
]

let items = [
    { item: document.getElementById("item"), x:600, y:500, picked:false, type:"blue" },
    { item: document.getElementById("item2"), x:600, y:600, picked:false, type:"green" },
    { item: document.getElementById("item3"), x:600, y:700, picked:false, type:"orange" },
    { item: document.getElementById("item4"), x:600, y:800, picked:false, type:"purple" },
]

document.addEventListener("keydown", event => keys[event.key] = true)
document.addEventListener("keyup", event => keys[event.key] = false)

function colliding(item){
    let playerSize = 50
    let itemSize = 40

    return (
        (x < item.x + itemSize) && (x + playerSize > item.x) && (y < item.y + itemSize) && (y + playerSize > item.y)
    )
}
function blocked(newX, newY){
    return doors.some(dor => {
        if(dor.unlocked) return false
        return (
            newX < dor.x + 80 &&
            newX + 30 > dor.x &&
            newY < dor.y + 80 &&
            newY + 30 > dor.y
        )
    })
}
function contact(dor){
    return (
        x < dor.x + 100 &&
        x + 50 > dor.x &&
        y < dor.y + 100 &&
        y + 50 > dor.y
    )
}
function door1(dor){
    let playerSize = 50
    let itemSize = 100;
    return (
        (x < dor.x + itemSize) && (x + playerSize > dor.x) && (y < dor.y + itemSize) && (y + playerSize > dor.y)
    )
}

function move(){
    let speed = keys["Shift"] ? 40 : 10

    let newX = x
    let newY = y

    if(keys["ArrowUp"]) newY -= speed
    if(keys["ArrowDown"]) newY += speed
    if(keys["ArrowLeft"]) newX -= speed
    if(keys["ArrowRight"]) newX += speed

    if(newX < 0) newX = 0
    if(newY < 0) newY = 0
    if(newX > 1950) newX = 1950
    if(newY > 1950) newY = 1950

    if(!blocked(newX, newY)){
        x = newX
        y = newY
    }
    player.style.left = x + "px"
    player.style.top = y + "px"

    screen.style.left= (250-x)+ "px"
    screen.style.top= (250-y)+ "px"

    items.forEach((item, index) => {
        if(!item.picked){
            item.item.style.left = item.x +"px"
            item.item.style.top = item.y + "px"
        }

        if(!item.picked && colliding(item) && keys[" "]){
            item.picked = true
            inventory[item.type] = true
            item.item.style.position = "fixed"
            item.item.style.top = "60px"
            item.item.style.left = (100 + index * 60) + "px"
        }

        doors.forEach((dor, index) => {
            dor.dor.style.left = dor.x + "px"
            dor.dor.style.top = dor.y + "px"

        if(!dor.unlocked && contact(dor) && inventory[dor.type] && keys[" "]){
                dor.unlocked = true
                dor.dor.style.backgroundColor ="red"
                dor.dor.textContent="Opened"

                items.forEach(item => {
                    if(item.type === dor.type){
                    item.item.style.display ="none"
            }
        })
        inventory[dor.type]=false
            }
        })
    })
    requestAnimationFrame(move)
}
    move()
</script>
</body>
</html>
