<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

#board{
    width:500px;
    height:500px;
    overflow:hidden;
    border:4px solid;
    position:relative;
}

#screen{
    width:2000px;
    height:2000px;
    position:absolute;
    background-image: url(IMG_20251001_093540_599.jpg);
    background-repeat: repeat;
}

#player{
    width:50px;
    height:50px;
    background:green;
    position:absolute;
    color:white;
    text-align:center;
    line-height:50px;
}

.item{
    width:40px;
    height:40px;
    position:absolute;
    border-radius:50%;
    border: solid green 4px;
}
#item{
    background-color: rgb(38, 0, 128);
}
#item2{
    background-color: rgb(128, 0, 0);
}
#item3{
    background-image: url(IMG_20251001_093540_599.jpg);
}
#blueDoor{
    width: 100px;
    height: 100px;
    background-color: aqua;
    border: solid blue 4px;
    position:absolute;
}
#greenDoor{
    width: 100px;
    height: 100px;
    background-color: rgb(0, 255, 51);
    border: solid rgb(2, 139, 0) 4px;
    position:absolute;
}
</style>
</head>

<body>

<div id="board">
    <div id="screen">
        <div id="player">Me</div>
        <div id="item" class="item"></div>
        <div id="item2" class="item"></div>
        <div id="item3" class="item"></div>

        <div id="blueDoor">Closed</div>
        <div id="greenDoor">Closed</div>
    </div>
</div>

<script>
let player = document.getElementById("player")
let screen = document.getElementById("screen")
let x = 100
let y = 100
let keys = {}

let doors =[
    { dor: document.getElementById("blueDoor"), x:1000, y:1000},
    { dor: document.getElementById("greenDoor"), x:500, y:500},
]
let items = [
    { item: document.getElementById("item"), x:600, y:600, picked:false },
    { item: document.getElementById("item2"), x:800, y:500, picked:false, key:false },
    { item: document.getElementById("item3"), x:400, y:700, picked:false }
]

document.addEventListener("keydown", event => keys[event.key] = true)
document.addEventListener("keyup", event => keys[event.key] = false)

function colliding(item){
    let playerSize = 50
    let itemSize = 40

    return (
        (x < item.x + itemSize) && (x + playerSize > item.x) && (y < item.y + itemSize) && (y + playerSize > item.y)
    )
}

function door1(dor){
    let playerSize = 50
    let itemSize = 100;
    
    return (
        (x < dor.x + itemSize) && (x + playerSize > dor.x) && (y < dor.y + itemSize) && (y + playerSize > dor.y)
    )
}
function move(){
    let speed = keys["Shift"] ? 40 : 10

    if(keys["ArrowUp"]) y -= speed
    if(keys["ArrowDown"]) y += speed
    if(keys["ArrowLeft"]) x -= speed
    if(keys["ArrowRight"]) x += speed

    if(x < 0) x = 0
    if(y < 0) y = 0
    if(x > 1950) x = 1950
    if(y > 1950) y = 1950

    player.style.left = x + "px"
    player.style.top = y + "px"

    screen.style.left= (250-x)+ "px"
    screen.style.top= (250-y)+ "px"

    items.forEach((item, index) => {
        if(!item.picked){
            item.item.style.left = item.x + "px"
            item.item.style.top = item.y + "px"
        }

        if(!item.picked && colliding(item) && keys[" "]){
            item.picked = true
            item.item.style.position = "fixed"
            item.item.style.top = "10px"
            item.item.style.right = (10 + index * 50) + "px"
        }
        doors.forEach((dor, index) => {
            dor.dor.style.left = dor.x + "px"
            dor.dor.style.top = dor.y + "px"
            // console.log(item.picked, door1(dor))
            if(item.picked ==true && keys[" "] && door1(dor)){
                    item.key = true;
                    dor.dor.style.backgroundColor ="red";
                    dor.dor.textContent="Opened";
                    // console.log(doors.unlocked)
                }
            })
    })
    
    requestAnimationFrame(move)
}
move()
</script>
</body>
</html>
