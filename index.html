<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#board{
    width:90%;
    height:90%;
    overflow:hidden;
    border:4px solid;
    position:relative;
}

#screen{
    width:2000px;
    height:2000px;
    position:absolute;
    background-image: url(IMG_20251001_093540_599.jpg);
    background-repeat: repeat;
}

#player{
    width:50px;
    height:50px;
    background:green;
    position:absolute;
    color:white;
    text-align:center;
    line-height:50px;
}

.item{
    width:40px;
    height:40px;
    position:absolute;
    border-radius:50%;
    border: solid green 4px;
}
#item{
    background-color: rgb(38, 0, 128);
}
#item2{
    background-color: rgb(128, 0, 0);
}
#item3{
    background-image: url(IMG_20251001_093540_599.jpg);
}
#blueDoor{
    width: 100px;
    height: 100px;
    background-color: aqua;
    border: solid blue 4px;
    position:absolute;
}
#greenDoor{
    width: 100px;
    height: 100px;
    background-color: rgb(0, 255, 51);
    border: solid rgb(2, 139, 0) 4px;
    position:absolute;
}
#orangeDoor{
    width: 100px;
    height: 100px;
    background-color: rgb(255, 145, 0);
    border: solid rgb(139, 51, 0) 4px;
    position:absolute;
}
#PurpleDoor{
    width: 100px;
    height: 100px;
    background-color: rgb(140, 0, 255);
    border: solid rgb(44, 0, 78) 4px;
    position:absolute;
}
</style>
</head>
<body>
    
<div id="board">
    <div id="screen">
        <div id="player">Me</div>
        <div id="item" class="item">Key1</div>
        <div id="item2" class="item">Key2</div>
        <div id="item3" class="item">Key3</div>
        <div id="item4" class="item">Key4</div>

        <div id="blueDoor">Closed</div>
        <div id="greenDoor">Closed</div>
        <div id="orangeDoor">Closed</div>
        <div id="PurpleDoor">Closed</div>
    </div>
</div>

<script>
let player = document.getElementById("player")
let screen = document.getElementById("screen")
let x = 100
let y = 100
let keys = {}
let inventory = {}

let doors =[
    { dor: document.getElementById("blueDoor"), x:1000, y:1000, type:"blue", unlocked:false},
    { dor: document.getElementById("greenDoor"), x:500, y:500, type:"green", unlocked:false},
    { dor: document.getElementById("orangeDoor"), x:800, y:800, type:"orange", unlocked:false},
    { dor: document.getElementById("PurpleDoor"), x:700, y:700, type:"purple", unlocked:false},
]

let items = [
    { item: document.getElementById("item"), x:600, y:500, picked:false, type:"blue" },
    { item: document.getElementById("item2"), x:600, y:600, picked:false, type:"green" },
    { item: document.getElementById("item3"), x:600, y:700, picked:false, type:"orange" },
    { item: document.getElementById("item4"), x:600, y:800, picked:false, type:"purple" },

]

document.addEventListener("keydown", event => keys[event.key] = true)
document.addEventListener("keyup", event => keys[event.key] = false)

function colliding(item){
    let playerSize = 50
    let itemSize = 40

    return (
        (x < item.x + itemSize) && (x + playerSize > item.x) && (y < item.y + itemSize) && (y + playerSize > item.y)
    )
}
function door1(dor){
    let playerSize = 50
    let itemSize = 100;
    return (
        (x < dor.x + itemSize) && (x + playerSize > dor.x) && (y < dor.y + itemSize) && (y + playerSize > dor.y)
    )
}

function move(){
    let speed = keys["Shift"] ? 40 : 10

    if(keys["ArrowUp"]) y -= speed
    if(keys["ArrowDown"]) y += speed
    if(keys["ArrowLeft"]) x -= speed
    if(keys["ArrowRight"]) x += speed

    if(x < 0) x = 0
    if(y < 0) y = 0
    if(x > 2000) x = 2000
    if(y > 2000) y = 2000

    player.style.left = x + "px"
    player.style.top = y + "px"

    screen.style.left= (250-x)+ "px"
    screen.style.top= (250-y)+ "px"

    items.forEach((item, index) => {
        if(!item.picked){
            item.item.style.left = item.x +"px"
            item.item.style.top = item.y + "px"
        }
        if(!item.picked && colliding(item) && (keys[" "] || keys["Space"])){
            item.picked = true
            inventory[item.type] = true
            item.item.style.position = "fixed"
            item.item.style.top = "60px"
            item.item.style.left = (0 + index * 60) + "px"
        }

        doors.forEach((dor, index) => {
            dor.dor.style.left = dor.x + "px"
            dor.dor.style.top = dor.y + "px"

            if(!dor.unlocked && door1(dor) &&inventory[dor.type] && keys[" "]){
                dor.unlocked = true
                dor.dor.style.backgroundColor ="red"
                dor.dor.textContent="Opened"

                items.forEach(item => {
                    if(item.type === dor.type){
                    item.item.style.display ="none"
            }
        })
        inventory[dor.type]=false
            }
        })
    })
    requestAnimationFrame(move)
}
    move()
</script>
</body>
</html>
