<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

#board{
    width:500px;
    height:500px;
    overflow:hidden;
    border:4px solid;
    position:relative;
}

#screen{
    width:2000px;
    height:2000px;
    position:absolute;
    background-image: url(IMG_20251001_093540_599.jpg);
    background-repeat: repeat;
}

#player{
    width:50px;
    height:50px;
    background:green;
    position:absolute;
    color:white;
    text-align:center;
    line-height:50px;
}

.item{
    width:40px;
    height:40px;
    position:absolute;
    border-radius:50%;
    background-color: purple;
}
</style>
</head>

<body>

<div id="board">
    <div id="screen">
        <div id="player">Me</div>
        <div id="item" class="item"></div>
        <div id="item2" class="item"></div>
        <div id="item3" class="item"></div>
    </div>
</div>

<script>
let player = document.getElementById("player")
let screen = document.getElementById("screen")

let x = 100
let y = 100
let keys = {}

// ✅ ALL ITEMS IN ARRAY
let items = [
    { item: document.getElementById("item"),  x:600, y:600, picked:false },
    { item: document.getElementById("item2"), x:800, y:500, picked:false },
    { item: document.getElementById("item3"), x:400, y:700, picked:false }
]

document.addEventListener("keydown", event => keys[event.key] = true)
document.addEventListener("keyup", event => keys[event.key] = false)

function colliding(item){
    let playerSize = 50
    let itemSize = 40

    return (
        x < item.x + itemSize &&
        x + playerSize > item.x &&
        y < item.y + itemSize &&
        y + playerSize > item.y
    )
}

function move(){
    let speed = keys["Shift"] ? 40 : 10

    if(keys["ArrowUp"]) y -= speed
    if(keys["ArrowDown"]) y += speed
    if(keys["ArrowLeft"]) x -= speed
    if(keys["ArrowRight"]) x += speed

    if(x < 0) x = 0
    if(y < 0) y = 0
    if(x > 1950) x = 1950
    if(y > 1950) y = 1950

    player.style.left = x + "px"
    player.style.top = y + "px"

    screen.style.left= (250-x)+ "px"
    screen.style.top= (250-y)+ "px"

    items.forEach((item, index) => {

        if(!item.picked){
            item.item.style.left = item.x + "px"
            item.item.style.top = item.y + "px"
        }

        if(!item.picked && colliding(item) && keys[" "]){
            item.picked = true

            // stack in top-right
            item.item.style.position = "fixed"
            item.item.style.top = "10px"
            item.item.style.right = (10 + index * 50) + "px"
        }

    })

    requestAnimationFrame(move)
}

move()
</script>

</body>
</html>
