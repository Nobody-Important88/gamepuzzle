<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#board{
    width:90%;
    height:90%;
    overflow:hidden;
    border:4px solid;
    position:relative;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    width:300px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    border-radius:10px;
    z-index:10;
}

#inventory{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.slot{
    width:40px;
    height:40px;
    border:2px solid white;
    display:flex;
    align-items:center;
    justify-content:center;
}

#screen{
    width:2000px;
    height:2000px;
    position:absolute;
    background-image: url(IMG_20251001_093540_599.jpg);
    background-repeat: repeat;
}

#player{
    width:50px;
    height:50px;
    background:green;
    position:absolute;
    color:white;
    text-align:center;
    line-height:50px;
}

.item{
    width:40px;
    height:40px;
    position:absolute;
    border-radius:50%;
    border: solid green 4px;
}

#item{ background-color: aqua; }
#item2{ background-color: lime; }
#item3{ background-color: orange; }
#item4{ background-color: purple; }
#item5{ background-color: violet; }

#light{
    width:120px;
    height:120px;
    position:absolute;
    border-radius:50%;
    background: radial-gradient(rgba(128,0,128,0.5), rgba(128,0,128,0));
    pointer-events:none;
    display:none;
}

.secret{
    position:absolute;
    color:rgba(255,255,255,0);
    font-size:20px;
    pointer-events:none;
    transition:0.3s;
    background-color: brown;
}

#blueDoor{ background:aqua; border:solid blue 4px; }
#greenDoor{ background:lime; border:solid green 4px; }
#orangeDoor{ background:orange; border:solid brown 4px; }
#PurpleDoor{ background:purple; border:solid black 4px; }

.door{
    width:100px;
    height:100px;
    position:absolute;
}
.wall{
    position:absolute;
    background:rgba(0,0,0,0.8);
    border:2px solid white;
}
</style>
</head>
<body>
    
<div id="board">
    <div id="ui">
        <div id="inventory"></div>
    </div>

    <div id="screen">

        <div id="light"></div>

        <div id="player">Me</div>

        <div id="item" class="item">Key1</div>
        <div id="item2" class="item">Key2</div>
        <div id="item3" class="item">Key3</div>
        <div id="item4" class="item">Key4</div>

        <div id="item5" class="item">light</div>

        <div class="secret" style="left:300px; top:300px;">You found Me lil bro</div>
        <div class="secret" style="left:1200px; top:400px;">The trustworthy</div>

        <div id="blueDoor" class="door">Closed</div>
        <div id="greenDoor" class="door">Closed</div>
        <div id="orangeDoor" class="door">Closed</div>
        <div id="PurpleDoor" class="door">Closed</div>
        
        <div class="wall" id="wall1"></div>
        <div class="wall" id="wall2"></div>
        <div class="wall" id="wall3"></div>
    </div>
</div>

<script>
let player = document.getElementById("player")
let screen = document.getElementById("screen")
let inventoryUI = document.getElementById("inventory")
let light = document.getElementById("light")

let on = false
let secrets = document.querySelectorAll(".secret")

let x = 100
let y = 100
let keys = {}
let inventory = {}
let slotss = {}
let order = []

let doors = [
    { dor: document.getElementById("blueDoor"), x:1000, y:1000, type:"blue", unlocked:false},
    { dor: document.getElementById("greenDoor"), x:500, y:500, type:"green", unlocked:false},
    { dor: document.getElementById("orangeDoor"), x:800, y:800, type:"orange", unlocked:false},
    { dor: document.getElementById("PurpleDoor"), x:700, y:700, type:"purple", unlocked:false},
]

let items = [
    { item: document.getElementById("item"), x:600, y:500, picked:false, type:"blue" },
    { item: document.getElementById("item2"), x:600, y:600, picked:false, type:"green" },
    { item: document.getElementById("item3"), x:600, y:700, picked:false, type:"orange" },
    { item: document.getElementById("item4"), x:600, y:800, picked:false, type:"purple" },
    { item: document.getElementById("item5"), x:650, y:900, picked:false, type:"light" },
]

let walls = [
    { el: document.getElementById("wall1"), x: 300, y: 300, w: 600, h: 20 },
    { el: document.getElementById("wall2"), x: 300, y: 300, w: 20, h: 600 },
    { el: document.getElementById("wall3"), x: 900, y: 500, w: 400, h: 20 },
]

document.addEventListener("keydown", e => keys[e.key] = true)
document.addEventListener("keyup", e => keys[e.key] = false)

function colliding(item){
    return (
        x < item.x + 40 &&
        x + 50 > item.x &&
        y < item.y + 40 &&
        y + 50 > item.y
    )
}

function blocked(newX, newY){
    return doors.some(dor => {
        if(dor.unlocked) return false
        return (
            newX < dor.x + 80 &&
            newX + 30 > dor.x &&
            newY < dor.y + 80 &&
            newY + 30 > dor.y
        )
    })
}

function wallBlocked(newX, newY){
    for(let w of walls){
        if(
            newX < w.x + w.w &&
            newX + 50 > w.x &&
            newY < w.y + w.h &&
            newY + 50 > w.y
        ){
            return true
        }
    }
    return false
}

function contact(dor){
    return (
        x < dor.x + 100 &&
        x + 50 > dor.x &&
        y < dor.y + 100 &&
        y + 50 > dor.y
    )
}

function adinventory(type){
    if(!inventory[type]){
        inventory[type] = 0
        slotss[type] = []
    }

    inventory[type]++
    order.push(type)

    let slot = document.createElement("div")
    slot.className = "slot"
    slot.textContent = type

    inventoryUI.appendChild(slot)
    slotss[type].push(slot)
}

function move(){
    let speed = keys["Shift"] ? 40 : 10

    let newX = x
    let newY = y

    if(keys["ArrowUp"]) newY -= speed
    if(keys["ArrowDown"]) newY += speed
    if(keys["ArrowLeft"]) newX -= speed
    if(keys["ArrowRight"]) newX += speed

    if(newX < 0) newX = 0
    if(newY < 0) newY = 0
    if(newX > 1950) newX = 1950
    if(newY > 1950) newY = 1950

    walls.forEach(w => {
        w.el.style.left = w.x + "px"
        w.el.style.top = w.y + "px"
        w.el.style.width = w.w + "px"
        w.el.style.height = w.h + "px"
    })

    if(!blocked(newX, newY) && !wallBlocked(newX, newY)){
        x = newX
        y = newY
    }

    player.style.left = x + "px"
    player.style.top = y + "px"

    screen.style.left = (400 - x) + "px"
    screen.style.top = (300 - y) + "px"

    if(keys["x"]){
        keys["x"] = false
        if(inventory["light"] > 0) on = !on
    }

    if(keys["q"]){
        keys["q"] = false
        let dtype = order.shift()

        if(dtype){
            inventory[dtype]--

            let slot = slotss[dtype].shift()
            if(slot) slot.remove()

            let dropp = items.find(i => i.type === dtype && i.picked)

            if(dropp){
                dropp.picked = false
                dropp.x = x
                dropp.y = y
                dropp.item.style.display = "block"
            }
        }
    }

    if(on){
    light.style.display = "block"
    light.style.left = (x - 35) + "px"
    light.style.top = (y - 35) + "px"

    let ax = x
    let ay = y
    let lightSize = 120

    secrets.forEach(sec => {
        let sx = sec.offsetLeft
        let sy = sec.offsetTop

        let touching =
            ax < sx + 120 &&
            ax + lightSize > sx &&
            ay < sy + 30 &&
            ay + lightSize > sy

        if(touching){
            sec.style.color = "darkorange"
            sec.style.textShadow = "0 0 10px purple"
        } else {
            sec.style.color = "rgba(255,255,255,0)"
            sec.style.textShadow = "none"
        }
    })

} else {
    light.style.display = "none"
    secrets.forEach(sec => {
        sec.style.color = "rgba(255,255,255,0)"
        sec.style.textShadow = "none"
    })
}

    items.forEach(item => {
        if(!item.picked){
            item.item.style.left = item.x + "px"
            item.item.style.top = item.y + "px"
        }

        if(!item.picked && colliding(item) && keys[" "]){
            item.picked = true

            if(item.type === "light"){
                inventory["light"] = (inventory["light"] || 0) + 1
                on = false
            } else {
                let count = 0
                for(let k in inventory){
                    if(k !== "light") count += inventory[k]
                }
                if(count < 4) adinventory(item.type)
            }

            item.item.style.display = "none"
        }
    })

    doors.forEach(dor => {
        dor.dor.style.left = dor.x + "px"
        dor.dor.style.top = dor.y + "px"

        if(!dor.unlocked && contact(dor) && inventory[dor.type] && keys[" "]){
            dor.unlocked = true
            dor.dor.style.backgroundColor = "red"
            dor.dor.textContent = "Opened"

            inventory[dor.type]--
            let slot = slotss[dor.type].pop()
            if(slot) slot.remove()
        }
    })

    requestAnimationFrame(move)
}

move()
</script>
</body>
</html>
